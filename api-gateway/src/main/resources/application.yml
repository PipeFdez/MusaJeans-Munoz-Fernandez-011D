server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: pacientes-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/jean/**

        - id: gestion-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/inventario/**

        - id: pacientes-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/cliente/**

